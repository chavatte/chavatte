name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Cyber Snake
        uses: Platane/snk@v3
        with:
          github_user_name: chavatte
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00FF00&color_dots=#0d1117,#003300,#006600,#009900,#00CC00

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
